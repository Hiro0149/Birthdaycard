<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Happy Birthday</title>
  <style>
    :root{--text:#4a2733;--pink:#ff6f91;--orange:#ff9671;--green:#06C755}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}

    .app{width:min(430px,100%);height:min(780px,calc(100svh - 20px));min-height:620px;position:relative;overflow:hidden;border-radius:34px;box-shadow:0 24px 70px rgba(120,50,80,.28);border:1px solid rgba(255,255,255,.7);transition:background .7s ease,color .7s ease;background:linear-gradient(145deg,#fff0f6,#ffd6e7,#ffc2d1)}

    .theme-3{background:radial-gradient(circle at 20% 20%,rgba(255,255,255,.9),transparent 25%),radial-gradient(circle at 76% 78%,rgba(255,255,255,.5),transparent 30%),linear-gradient(145deg,#fdfbfb,#ebedee,#c8f7dc)}
    .theme-4{background:radial-gradient(circle at 70% 20%,rgba(255,255,255,.8),transparent 28%),radial-gradient(circle at 24% 80%,rgba(255,255,255,.45),transparent 30%),linear-gradient(145deg,#dff9fb,#c7ecee,#f8cdda)}
    .theme-5{background:radial-gradient(circle at 50% 20%,rgba(255,255,255,.23),transparent 20%),radial-gradient(circle at 18% 82%,rgba(255,111,145,.22),transparent 26%),linear-gradient(160deg,#141e30,#243b55);color:#fff}
    .theme-6{background:radial-gradient(circle at 30% 15%,rgba(255,255,255,.95),transparent 26%),radial-gradient(circle at 80% 86%,rgba(255,255,255,.45),transparent 28%),linear-gradient(145deg,#fff1eb,#ace0f9)}
    .theme-7{background:radial-gradient(circle at 70% 20%,rgba(255,255,255,.92),transparent 26%),radial-gradient(circle at 18% 84%,rgba(255,255,255,.43),transparent 30%),linear-gradient(145deg,#fbc2eb,#a6c1ee)}
    .theme-8{background:radial-gradient(circle at 50% 18%,rgba(255,255,255,.25),transparent 20%),radial-gradient(circle at 80% 80%,rgba(255,111,145,.15),transparent 30%),linear-gradient(160deg,#0f2027,#203a43,#2c5364);color:#fff}
    .theme-9{background:radial-gradient(circle at 20% 20%,rgba(255,255,255,.9),transparent 26%),radial-gradient(circle at 80% 84%,rgba(255,255,255,.42),transparent 30%),linear-gradient(145deg,#ffdde1,#ee9ca7)}

    .screen{position:absolute;inset:0;display:none;flex-direction:column;justify-content:center;align-items:center;padding:32px 22px;text-align:center;z-index:5;animation:fadeIn .55s ease both}.screen.active{display:flex}

    h2{margin:0 0 18px;font-size:25px;line-height:1.45}p{margin:0;font-size:17px;line-height:1.8}.small{margin-top:14px;font-size:13px;opacity:.65}
    .btn,.miniBtn{border:none;border-radius:999px;padding:15px 28px;font-size:17px;font-weight:900;color:#fff;background:linear-gradient(135deg,var(--pink),var(--orange));box-shadow:0 12px 26px rgba(255,111,145,.36);cursor:pointer;text-decoration:none;touch-action:manipulation}.btn:active,.miniBtn:active,.yesBtn:active{transform:scale(.95)}
    .startCard{position:relative;overflow:hidden;z-index:2}.introBouquetLayer{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1}.introPetal{position:absolute;font-size:22px;animation:introPetalFall 5.8s linear forwards;opacity:0;will-change:transform,opacity}
    @keyframes introPetalFall{0%{transform:translateY(-60px) translateX(0) rotate(0);opacity:0}12%{opacity:1}100%{transform:translateY(780px) translateX(var(--drift)) rotate(420deg);opacity:0}}
    .bouquetBox{position:relative;width:170px;height:150px;margin:-6px auto 8px;display:flex;align-items:center;justify-content:center}.bouquetGlow{position:absolute;width:148px;height:148px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.98),rgba(255,182,193,.48) 38%,transparent 72%);filter:blur(2px);animation:bouquetGlow 2.2s ease-in-out infinite}.bouquet{position:relative;z-index:2;font-size:92px;animation:bouquetEntrance 1.25s ease-out both,bouquetFloat 2.8s ease-in-out infinite 1.25s;filter:drop-shadow(0 14px 20px rgba(120,50,80,.22))}

    .miniFlowers span{position:absolute;z-index:3;font-size:22px;animation:miniFlowerPop 2.4s ease-in-out infinite}.miniFlowers span:nth-child(1){left:12px;top:18px;animation-delay:.1s}.miniFlowers span:nth-child(2){right:18px;top:26px;animation-delay:.35s}.miniFlowers span:nth-child(3){left:30px;bottom:18px;animation-delay:.6s}.miniFlowers span:nth-child(4){right:30px;bottom:22px;animation-delay:.85s}.miniFlowers span:nth-child(5){left:74px;top:4px;animation-delay:1.1s}@keyframes miniFlowerPop{0%,100%{transform:translateY(0) scale(.85) rotate(0);opacity:.65}50%{transform:translateY(-10px) scale(1.16) rotate(12deg);opacity:1}}
    .messageNo{font-size:13px;font-weight:800;letter-spacing:.08em;color:rgba(255,111,145,.9);margin-bottom:14px}.theme-5 .messageNo,.theme-8 .messageNo,.theme-10 .messageNo{color:rgba(255,255,255,.85)}.messageText{min-height:205px;display:flex;align-items:center;justify-content:center;font-size:21px;font-weight:800;line-height:1.72;white-space:pre-line}
    .questionArea{width:100%;height:166px;margin-top:24px;position:relative;overflow:hidden;border-radius:24px;background:rgba(255,255,255,.36);border:1px dashed rgba(255,111,145,.38)}.theme-5 .questionArea,.theme-8 .questionArea,.theme-10 .questionArea{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.32)}.questionText{padding-top:17px;font-size:16px;font-weight:800}.hint{position:absolute;left:18px;right:18px;bottom:15px;font-size:12px;opacity:.58}
    .yesBtn,.noBtn{position:absolute;top:82px;height:48px;min-width:112px;border-radius:999px;font-size:18px;font-weight:900;cursor:pointer;transition:left .2s ease,top .2s ease,transform .15s ease,opacity .15s ease;touch-action:manipulation}.yesBtn{left:calc(50% - 126px);border:none;color:#fff;background:linear-gradient(135deg,var(--pink),var(--orange));box-shadow:0 11px 24px rgba(255,111,145,.38);z-index:3}.noBtn{left:calc(50% + 18px);color:#ff5f8f;background:#fff;border:2px solid rgba(255,111,145,.42);box-shadow:0 9px 20px rgba(80,30,55,.13);z-index:2}.noBtn.hiding{z-index:1;transform:scale(.78);opacity:.78}.noBtn.exploding{animation:noExplode .55s ease-out forwards;pointer-events:none}@keyframes noExplode{0%{transform:scale(1) rotate(0);opacity:1;filter:brightness(1)}35%{transform:scale(1.35) rotate(12deg);opacity:1;filter:brightness(2)}100%{transform:scale(.1) rotate(540deg);opacity:0;filter:brightness(3)}}
    .effectLayer,.burstLayer{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:6}.burstLayer{z-index:9}.particle{position:absolute;pointer-events:none;will-change:transform,opacity}.heartParticle{font-size:22px;animation:floatUp 4.8s linear forwards}.flowerParticle{font-size:22px;animation:flowerFall 6.2s linear forwards}.bubbleParticle{width:28px;height:28px;border-radius:50%;border:1.5px solid rgba(255,255,255,.78);background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.9),rgba(255,255,255,.12) 35%,rgba(255,255,255,.04));animation:bubbleUp 6.2s linear forwards}.starParticle{font-size:18px;animation:twinkleMove 4.6s ease-in-out forwards}.shootingStar{width:120px;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.95),transparent);transform:rotate(-28deg);animation:shooting 1.3s ease-out forwards;filter:drop-shadow(0 0 8px #fff)}.fireworkDot{width:7px;height:7px;border-radius:50%;background:#fff;animation:explode .9s ease-out forwards;box-shadow:0 0 12px currentColor}
    @keyframes floatUp{0%{transform:translateY(40px) scale(.7) rotate(0);opacity:0}15%{opacity:1}100%{transform:translateY(-760px) scale(1.4) rotate(28deg);opacity:0}}@keyframes flowerFall{0%{transform:translateY(-60px) translateX(0) rotate(0);opacity:0}10%{opacity:1}100%{transform:translateY(820px) translateX(90px) rotate(360deg);opacity:0}}@keyframes bubbleUp{0%{transform:translateY(70px) scale(.55);opacity:0}15%{opacity:.9}100%{transform:translateY(-760px) scale(1.45);opacity:0}}@keyframes twinkleMove{0%{transform:translateY(40px) scale(.5) rotate(0);opacity:0}25%{opacity:1}100%{transform:translateY(-500px) scale(1.3) rotate(180deg);opacity:0}}@keyframes shooting{from{transform:translate(260px,-40px) rotate(-28deg);opacity:0}15%{opacity:1}to{transform:translate(-360px,340px) rotate(-28deg);opacity:0}}@keyframes explode{from{transform:translate(0,0) scale(.8);opacity:1}to{transform:translate(var(--x),var(--y)) scale(.1);opacity:0}}
    .treasure{font-size:104px;margin:22px 0 4px;cursor:pointer;animation:treasureBounce 1.4s ease-in-out infinite;filter:drop-shadow(0 18px 20px rgba(0,0,0,.22))}@keyframes treasureBounce{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-12px) rotate(2deg)}}.photoWrap{width:100%;display:none;animation:fadeIn .7s ease both}.photoWrap.active{display:block}.finalMessage{margin-bottom:18px;padding:18px 16px;border-radius:22px;background:rgba(255,255,255,.20);border:1px solid rgba(255,255,255,.32);font-size:17px;font-weight:800;line-height:1.7;white-space:pre-line;box-shadow:0 12px 28px rgba(0,0,0,.14)}.photo,.photoFallback{width:100%;height:330px;border-radius:26px;box-shadow:0 16px 42px rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.65)}.photo{object-fit:cover;background:rgba(255,255,255,.55);display:block}.photoFallback{display:none;align-items:center;justify-content:center;padding:24px;font-size:16px;line-height:1.7;font-weight:800;background:rgba(255,255,255,.26);white-space:pre-line}.photoCaption{margin-top:18px;font-size:24px;font-weight:900;line-height:1.55;white-space:pre-line;text-shadow:0 3px 12px rgba(0,0,0,.18)}.photoNav{margin-top:20px;display:flex;justify-content:center;gap:14px}.miniBtn{padding:15px 22px;font-size:18px;min-width:118px}.photoNav .miniBtn:last-child{min-width:150px;padding:16px 28px;font-size:19px;background:linear-gradient(135deg,#ff4f86,#ff9671);box-shadow:0 12px 26px rgba(255,111,145,.35)}
    .lineIcon{width:86px;height:86px;margin:0 auto 18px;border-radius:28px;display:flex;align-items:center;justify-content:center;font-size:48px;background:linear-gradient(135deg,#06C755,#67e88b);color:#fff;box-shadow:0 16px 36px rgba(6,199,85,.35);animation:linePop 1.25s ease-in-out infinite}.lineReturnText{font-size:25px;font-weight:900;line-height:1.55;margin-bottom:18px}.lineReturnSub{font-size:17px;line-height:1.85;opacity:.9;margin-bottom:4px;white-space:pre-line}@keyframes linePop{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-8px) scale(1.06)}}
    @media(max-height:700px){.app{min-height:580px}.bouquetBox{height:125px;margin-top:-10px}.bouquet{font-size:76px}.messageText{min-height:165px;font-size:19px}.questionArea{height:156px}.photo,.photoFallback{height:280px}.photoCaption{font-size:21px;margin-top:14px}.finalMessage{font-size:15px;padding:14px 13px}.lineReturnText{font-size:22px}}
  </style>
</head>
<body>
  <main class="app theme-1" id="app">
    <div class="effectLayer" id="effectLayer"></div><div class="burstLayer" id="burstLayer"></div>
    <section class="screen active" id="startScreen"><div class="introBouquetLayer" id="introBouquetLayer"></div><div class="card startCard"><div class="bouquetBox"><div class="bouquetGlow"></div><div class="bouquet">💐</div><div class="miniFlowers"><span>🌸</span><span>🌷</span><span>🌼</span><span>💖</span><span>✨</span></div></div><h1>Happy<br>Birthday</h1><p>三奈へ、<br>今日は特別な花束を贈ります。</p><br><button class="btn" onclick="startApp()">開く</button><div class="small">Tap to open</div></div></section>
    <section class="screen" id="messageScreen"><div class="card"><div class="messageNo" id="messageNo">MESSAGE 1 / 10</div><div class="messageText" id="messageText"></div><div class="questionArea" id="questionArea"><div class="questionText" id="questionText"></div><button class="yesBtn" id="yesBtn">YES</button><button class="noBtn" id="noBtn">NO</button><div class="hint" id="hintText">※NOは少し照れ屋です</div></div></div></section>
    <section class="screen" id="treasureScreen"><div class="card" id="treasureCard"><h2>最後に、もうひとつだけ。</h2><p>ここまで進んでくれてありがとう。<br>宝箱をタップしてね。</p><div class="treasure" onclick="openTreasure()">🎁</div><div class="small">Tap the treasure box</div></div><div class="photoWrap" id="photoWrap"><div class="finalMessage" id="finalMessage"></div><img class="photo" id="photo" src="" alt="思い出の写真"><div class="photoFallback" id="photoFallback"></div><div class="photoCaption" id="photoCaption"></div><div class="photoNav"><button class="miniBtn" onclick="prevPhoto()">前へ</button><button class="miniBtn" onclick="nextPhoto()">次へ</button></div></div></section>
    
    <section class="screen" id="lineReturnScreen">
      <img id="finalScreenPhoto" class="photo" src="" alt="最後の写真" style="height: 240px; margin-bottom: 16px; display: block;">
      
      <div class="card lineReturnCard" style="padding: 24px 16px;">
        <div class="lineIcon" style="width: 64px; height: 64px; font-size: 36px; margin: 0 auto 12px;">💬</div>
        <div class="lineReturnText" style="font-size: 21px; margin-bottom: 12px;">LINEに戻って、<br>いまの気持ちを伝えるー</div>
        <div class="lineReturnSub" style="font-size: 15px; margin-bottom: 4px;">ここまで見てくれてありがとう。<br>この画面を閉じて、LINEに戻ってね（笑）<br>答え合わせ、待ってます。</div>
      </div>
    </section>

  </main>
  <script>
    const scenes=[
      {message:"お誕生日おめでとう。\n三奈が生まれた奇跡の日だよ",question:"あ、ワイのメッセージ続くよ？",theme:"theme-1",effect:"hearts"},
      {message:"いつも本当にありがとう。\n三奈の気持ちにいつも感謝してます。",question:"ワイも想ってていいよね？",theme:"theme-2",effect:"flowers"},
      {message:"何気ない時間も、\n三奈と一緒だと楽しいよ。",question:"一緒にいる時間、好きだよね？",theme:"theme-3",effect:"bubbles"},
      {message:"三奈の笑顔を見ると、\nそれだけで嬉しい気持ちになります。",question:"ワイの気持ち、伝わってるよね？",theme:"theme-4",effect:"stars"},
      {message:"三奈の存在は、\nワイにとって本当に大切な宝物だよ。",question:"ワイも三奈の宝物？",theme:"theme-5",effect:"shooting"},
      {message:"これからも一緒に、\n楽しいことをたくさん増やしたいよ",question:"これからもワイと一緒にいてくれるよね？",theme:"theme-6",effect:"flowers"},
      {message:"三奈は本当に可愛いい、\nとても素敵だし尊敬してるよ",question:"ワイも素敵？",theme:"theme-7",effect:"bubbles"},
      {message:"三奈と出会えた事が、\n本当に奇跡だと思ってるよ。",question:"これからも三奈を支えさせてくれる？",theme:"theme-8",effect:"fireworks"},
      {message:"三奈はワイにとって、\n世界一大切な存在だよ。",question:"ワイ三奈にとっても大切な存在でしょ？",theme:"theme-9",effect:"hearts"},
      {message:"生まれてきてくれて有難う\n今日という日を、心から感謝します",question:"ワイのこと好きですか？",theme:"theme-10",effect:"final"}
    ];
    const photos=[
      {src:"photo1.png",fallback:"photo1.jpg",caption:"大好きだよ"},
      {src:"photo2.png",fallback:"photo2.jpg",caption:"運命の人"},
      {src:"photo3.png",fallback:"photo3.jpg",caption:"心から愛してます"}
    ];
    const finalMessageText="最後まで見てくれてありがとう。\n"+"こんなワイだけど。。。\n"+"まだまだ一緒に、たくさん笑って、たくさん一緒の時間を共にしたいです";
    let sceneIndex=0,photoIndex=0,noCount=0,noDestroyed=false,finalPromptTimer=null;
    const app=document.getElementById("app"),startScreen=document.getElementById("startScreen"),messageScreen=document.getElementById("messageScreen"),treasureScreen=document.getElementById("treasureScreen"),lineReturnScreen=document.getElementById("lineReturnScreen"),messageNo=document.getElementById("messageNo"),messageText=document.getElementById("messageText"),questionText=document.getElementById("questionText"),questionArea=document.getElementById("questionArea"),yesBtn=document.getElementById("yesBtn"),noBtn=document.getElementById("noBtn"),hintText=document.getElementById("hintText"),effectLayer=document.getElementById("effectLayer"),burstLayer=document.getElementById("burstLayer"),photo=document.getElementById("photo"),photoFallback=document.getElementById("photoFallback");
    function showScreen(t){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));t.classList.add("active")}
    function startIntroBouquet(){const layer=document.getElementById("introBouquetLayer");if(!layer)return;const items=["🌸","🌷","🌼","💮","💖","✨"];for(let i=0;i<34;i++){setTimeout(()=>{if(!startScreen.classList.contains("active"))return;const p=document.createElement("div");p.className="introPetal";p.textContent=items[Math.floor(Math.random()*items.length)];p.style.left=Math.random()*100+"%";p.style.top="-50px";p.style.fontSize=17+Math.random()*16+"px";p.style.setProperty("--drift",Math.random()*180-90+"px");p.style.animationDuration=4.8+Math.random()*2.6+"s";layer.appendChild(p);setTimeout(()=>p.remove(),8000)},i*130)}setTimeout(()=>{if(startScreen.classList.contains("active"))startIntroBouquet()},4200)}
    function startApp(){sceneIndex=0;const intro=document.getElementById("introBouquetLayer");if(intro)intro.innerHTML="";showScreen(messageScreen);renderScene()}
    function renderScene(){const s=scenes[sceneIndex];app.className="app "+s.theme;messageNo.textContent="MESSAGE "+(sceneIndex+1)+" / "+scenes.length;messageText.textContent=s.message;questionText.textContent=s.question;noCount=0;hintText.textContent="※NOは少し照れ屋です";resetButtons();startEffect(s.effect)}
    function resetButtons(){noDestroyed=false;noBtn.classList.remove("hiding","exploding");yesBtn.style.left="calc(50% - 126px)";yesBtn.style.top="82px";noBtn.style.left="calc(50% + 18px)";noBtn.style.top="82px";noBtn.style.display="block";noBtn.style.opacity="1";noBtn.style.pointerEvents="auto";noBtn.textContent="NO"}
    function nextScene(){burstHearts();smallFirework();sceneIndex++;if(sceneIndex>=scenes.length){app.className="app theme-10";startEffect("final");showScreen(treasureScreen);return}renderScene()}yesBtn.addEventListener("click",nextScene);
    function moveNoButton(){if(noDestroyed)return;noCount++;if(noCount>=6){explodeNoButton();return}const maxX=questionArea.clientWidth-noBtn.offsetWidth-10,maxY=questionArea.clientHeight-noBtn.offsetHeight-8,minY=58;const texts=["NO","え？","ほんとに？","まだ押す？","危険です","爆発寸前"];noBtn.textContent=texts[Math.min(noCount,texts.length-1)];if(noCount>=3&&Math.random()<.45){noBtn.classList.add("hiding");noBtn.style.left=yesBtn.offsetLeft+14+"px";noBtn.style.top=yesBtn.offsetTop+5+"px";hintText.textContent="NOはYESの後ろに避難しました";return}noBtn.classList.remove("hiding");noBtn.style.left=Math.max(8,Math.random()*maxX)+"px";noBtn.style.top=Math.max(minY,Math.random()*maxY)+"px";hintText.textContent=noCount>=4?"NOの様子がおかしいです":"やっぱりYESしか押せないようです"}
    ["mouseenter","pointerdown","touchstart","click"].forEach(ev=>noBtn.addEventListener(ev,e=>{e.preventDefault();moveNoButton()},{passive:false}));
    function explodeNoButton(){noDestroyed=true;hintText.textContent="NOは自らの運命を悟りました";const r=noBtn.getBoundingClientRect(),a=app.getBoundingClientRect(),cx=r.left-a.left+r.width/2,cy=r.top-a.top+r.height/2;noBtn.textContent="💣";noBtn.classList.remove("hiding");noBtn.classList.add("exploding");noBtn.style.pointerEvents="none";createExplosion(cx,cy);setTimeout(()=>{noBtn.style.display="none";hintText.textContent="YESだけが残されました";yesBtn.style.left="calc(50% - 56px)";yesBtn.style.top="82px"},560)}
    function createExplosion(cx,cy){const pieces=["💥","🔥","✨","💫","💨"],colors=["#ff6f91","#ffd166","#ff9671","#fff"];for(let i=0;i<30;i++){const p=document.createElement("div"),ang=Math.random()*Math.PI*2,d=35+Math.random()*85;p.className="particle fireworkDot";p.style.left=cx+"px";p.style.top=cy+"px";p.style.color=colors[Math.floor(Math.random()*colors.length)];p.style.background="currentColor";p.style.setProperty("--x",Math.cos(ang)*d+"px");p.style.setProperty("--y",Math.sin(ang)*d+"px");burstLayer.appendChild(p);setTimeout(()=>p.remove(),1000)}for(let i=0;i<8;i++){const e=document.createElement("div");e.className="particle";e.textContent=pieces[Math.floor(Math.random()*pieces.length)];e.style.left=cx-10+"px";e.style.top=cy-10+"px";e.style.fontSize=18+Math.random()*14+"px";e.style.setProperty("--x",Math.random()*160-80+"px");e.style.setProperty("--y",Math.random()*120-80+"px");e.style.animation="explode .9s ease-out forwards";burstLayer.appendChild(e);setTimeout(()=>e.remove(),1000)}}
    function clearEffects(){effectLayer.innerHTML=""}function startEffect(type){clearEffects();if(type==="hearts")createLoopParticles("heart");if(type==="flowers")createLoopParticles("flower");if(type==="bubbles")createLoopParticles("bubble");if(type==="stars")createLoopParticles("star");if(type==="shooting")createShootingStars();if(type==="fireworks")createFireworkLoop();if(type==="final"){createLoopParticles("heart");createShootingStars();createFireworkLoop()}}
    function activeEffectScreen(){return messageScreen.classList.contains("active")||treasureScreen.classList.contains("active")||lineReturnScreen.classList.contains("active")}
    function createLoopParticles(kind){const count=kind==="bubble"?22:28;for(let i=0;i<count;i++){setTimeout(()=>{const el=document.createElement("div");el.classList.add("particle");if(kind==="heart"){el.classList.add("heartParticle");el.textContent=["💗","💖","💕","✨"][Math.floor(Math.random()*4)];el.style.left=Math.random()*100+"%";el.style.bottom="-40px";el.style.animationDuration=4.2+Math.random()*3.2+"s"}if(kind==="flower"){el.classList.add("flowerParticle");el.textContent=["🌸","🌷","🌼","💮"][Math.floor(Math.random()*4)];el.style.left=Math.random()*100+"%";el.style.top="-50px";el.style.animationDuration=5.2+Math.random()*3.3+"s"}if(kind==="bubble"){el.classList.add("bubbleParticle");const size=18+Math.random()*32;el.style.width=size+"px";el.style.height=size+"px";el.style.left=Math.random()*100+"%";el.style.bottom="-60px";el.style.animationDuration=5.4+Math.random()*3.5+"s"}if(kind==="star"){el.classList.add("starParticle");el.textContent=["✨","⭐","✦","✧"][Math.floor(Math.random()*4)];el.style.left=Math.random()*100+"%";el.style.bottom="-40px";el.style.animationDuration=4+Math.random()*2.8+"s"}effectLayer.appendChild(el);setTimeout(()=>el.remove(),9000)},i*170)}setTimeout(()=>{const cur=scenes[sceneIndex]?scenes[sceneIndex].effect:"final",map=kind==="heart"?"hearts":kind==="flower"?"flowers":kind==="bubble"?"bubbles":"stars";if(activeEffectScreen()&&(cur===map||cur==="final"))createLoopParticles(kind)},3600)}
    function createShootingStars(){for(let i=0;i<8;i++)setTimeout(()=>{const s=document.createElement("div");s.className="particle shootingStar";s.style.left=Math.random()*100+"%";s.style.top=Math.random()*45+"%";effectLayer.appendChild(s);setTimeout(()=>s.remove(),1600)},i*650);setTimeout(()=>{const cur=scenes[sceneIndex]?scenes[sceneIndex].effect:"final";if(activeEffectScreen()&&["shooting","final"].includes(cur))createShootingStars()},5600)}
    function createFireworkLoop(){smallFirework();setTimeout(()=>{const cur=scenes[sceneIndex]?scenes[sceneIndex].effect:"final";if(activeEffectScreen()&&["fireworks","final"].includes(cur))createFireworkLoop()},1500)}
    function smallFirework(){const r=app.getBoundingClientRect(),cx=55+Math.random()*Math.max(220,r.width-110),cy=90+Math.random()*Math.max(240,r.height*.48),colors=["#fff","#ff6f91","#ffd166","#a0e7e5","#bdb2ff"];for(let i=0;i<22;i++){const dot=document.createElement("div"),ang=Math.PI*2*i/22,d=45+Math.random()*58;dot.className="particle fireworkDot";dot.style.left=cx+"px";dot.style.top=cy+"px";dot.style.color=colors[Math.floor(Math.random()*colors.length)];dot.style.background="currentColor";dot.style.setProperty("--x",Math.cos(ang)*d+"px");dot.style.setProperty("--y",Math.sin(ang)*d+"px");burstLayer.appendChild(dot);setTimeout(()=>dot.remove(),1000)}}
    function burstHearts(){for(let i=0;i<16;i++){const h=document.createElement("div");h.className="particle heartParticle";h.textContent=["💗","💖","💕","✨"][Math.floor(Math.random()*4)];h.style.left=Math.random()*100+"%";h.style.bottom="20px";h.style.animationDuration=1.6+Math.random()*1.2+"s";burstLayer.appendChild(h);setTimeout(()=>h.remove(),3000)}}
    function openTreasure(){document.getElementById("treasureCard").style.display="none";document.getElementById("photoWrap").classList.add("active");document.getElementById("finalMessage").textContent=finalMessageText;showPhoto();smallFirework();burstHearts()}
    function scheduleLineReturnIfLastPhoto(){if(finalPromptTimer)clearTimeout(finalPromptTimer);if(photoIndex===photos.length-1&&document.getElementById("photoWrap").classList.contains("active")){finalPromptTimer=setTimeout(()=>showLineReturnScreen(),3200)}}
    
    // 修正箇所：画像を確実に引き継げるように安全対策を追加
    function showLineReturnScreen(){
      app.className="app theme-10";
      startEffect("final");
      
      const finalImg = document.getElementById("finalScreenPhoto");
      const currentImg = document.getElementById("photo");
      if(finalImg && currentImg) {
        finalImg.src = currentImg.src;
      }
      
      showScreen(lineReturnScreen);
      smallFirework();
      burstHearts()
    }
    
    function showPhoto(){const p=photos[photoIndex];photo.style.display="block";photoFallback.style.display="none";let triedFallback=false;photo.onload=()=>{photo.style.display="block";photoFallback.style.display="none"};photo.onerror=()=>{if(p.fallback&&!triedFallback){triedFallback=true;photo.src=p.fallback;return}photo.style.display="none";photoFallback.style.display="flex";photoFallback.textContent="写真ファイルがまだ見つかりません。\n"+p.src+" を index.html と同じフォルダに置いてください。"};photo.src=p.src;document.getElementById("photoCaption").textContent=p.caption;scheduleLineReturnIfLastPhoto()}
    function nextPhoto(){if(photoIndex===photos.length-1){showLineReturnScreen();return}photoIndex++;showPhoto();burstHearts()}function prevPhoto(){if(finalPromptTimer)clearTimeout(finalPromptTimer);photoIndex=(photoIndex-1+photos.length)%photos.length;showPhoto();burstHearts()}
    startIntroBouquet();
  </script>
</body>
</html>
